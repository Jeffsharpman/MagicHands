<!doctype html>
<html lang="en" class="dark">
  <head>
    <!-- ════════════════════════════════════════════════════════════════════════
         MagicStitch — Head Architecture
         SEO-critical tags live here as fallback. React Helmet overrides
         at runtime for dynamic pages. This HTML is the crawl-first payload.
         ════════════════════════════════════════════════════════════════════════ -->

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO — title <60 chars, description <160 chars -->
    <title>MagicStitch — Custom Fashion, Tailored for You</title>
    <meta name="description" content="Custom-tailored clothing, accessories, footwear, and fragrances from Lagos, Nigeria. Every piece is built to your measurements — never mass-produced." />
    <meta name="keywords" content="custom clothing, tailored fashion, accessories, footwear, fragrances, MagicStitch, Lagos Nigeria, menswear, womenswear, luxury fashion" />
    <link rel="canonical" href="https://magicstitch.netlify.app" />

    <!-- Robots — explicit index/follow for primary crawlers -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />

    <!-- Author / Brand identity -->
    <meta name="author" content="Oyenuga Joshua" />
    <meta name="creator" content="Sharpman" />
    <meta name="publisher" content="MagicStitch" />

    <!-- Theme & Mobile -->
    <meta name="theme-color" content="#D4AF37" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MagicStitch" />
    <meta name="application-name" content="MagicStitch" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- ═══ Open Graph (WhatsApp, LinkedIn, Facebook) ═══════════════════════ -->
    <!-- OG title: ≤60 chars | OG description: ≤120 chars for best display    -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MagicStitch — Custom Fashion, Tailored for You" />
    <meta property="og:description" content="Custom-tailored clothing, accessories, footwear, and fragrances from Lagos. Built to your measurements — never mass-produced." />
    <meta property="og:url" content="https://magicstitch.netlify.app" />
    <meta property="og:image" content="https://magicstitch.netlify.app/hero-og.jpg" />
    <meta property="og:image:alt" content="MagicStitch — Custom-tailored clothing, accessories, footwear, and fragrances from Lagos, Nigeria" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:site_name" content="MagicStitch" />
    <meta property="og:locale" content="en_US" />

    <!-- ═══ Twitter Card ════════════════════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MagicStitch — Custom Fashion, Tailored for You" />
    <meta name="twitter:description" content="Custom-tailored clothing, accessories, footwear, and fragrances from Lagos. Built to your measurements — never mass-produced." />
    <meta name="twitter:image" content="https://magicstitch.netlify.app/hero-og.jpg" />
    <meta name="twitter:image:alt" content="MagicStitch fashion brand" />
    <meta name="twitter:creator" content="@sharpman_dev" />
    <meta name="twitter:site" content="@sharpman_dev" />

    <!-- ═══ Google Verification ═════════════════════════════════════════════ -->
    <meta name="google-site-verification" content="UMRK_ShfxZ8gTzdrV2c6TOM-E-_H5D_4wsR22k9BX28" />

    <!-- ═══ Performance: Preconnect / DNS-Prefetch ══════════════════════════ -->
    <!-- Preconnect = full TLS handshake (use for critical origins only) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- DNS-prefetch = DNS lookup only (use for non-critical external hosts) -->
    <link rel="dns-prefetch" href="https://wa.me" />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />

    <!-- ═══ Fonts ═══════════════════════════════════════════════════════════ -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
